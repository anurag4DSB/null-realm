name: code_search
version: "1.0"
description: Semantic code search across the codebase using embeddings
input_schema:
  type: object
  properties:
    query:
      type: string
      description: Natural-language description of the code to find
    language:
      type: string
      description: "Programming language filter (e.g. python, go)"
    max_results:
      type: integer
      description: Maximum number of results (default 10)
      default: 10
  required: [query]
execution_type: python
execution_config:
  module: nullrealm.tools.builtins.code_search
  class: CodeSearchTool
