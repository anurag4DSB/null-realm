name: graph_query
version: "1.0"
description: Query the Neo4j code knowledge graph for connected symbols, paths, and service maps
input_schema:
  type: object
  properties:
    symbol:
      type: string
      description: The symbol name to search for in the code graph
    depth:
      type: integer
      description: Maximum hop distance for neighbor queries (default 2)
      default: 2
  required: [symbol]
execution_type: python
execution_config:
  module: nullrealm.tools.builtins.graph_query
  class: GraphQueryTool
