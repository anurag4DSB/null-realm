name: web_search
version: "1.0"
description: Search the web for information using a query string
input_schema:
  type: object
  properties:
    query:
      type: string
      description: The search query
    max_results:
      type: integer
      description: Maximum number of results to return (default 5)
      default: 5
  required: [query]
execution_type: python
execution_config:
  module: nullrealm.tools.builtins.web_search
  class: WebSearchTool
