name: file_read
version: "1.0"
description: Read the contents of a file given its path
input_schema:
  type: object
  properties:
    path:
      type: string
      description: Path to the file to read
  required: [path]
execution_type: python
execution_config:
  module: nullrealm.tools.builtins.file_read
  class: FileReadTool
