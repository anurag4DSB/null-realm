name: feature_development
steps:
  - name: research
    assistant: research
    description: Research the topic and gather information
  - name: plan
    assistant: planner
    description: Create an implementation plan from research
    depends_on: research
  - name: implement
    assistant: poc_writer
    description: Write the implementation
    depends_on: plan
  - name: review
    assistant: code_reviewer
    description: Review the implementation
    depends_on: implement
max_parallel_agents: 1
