# docker-compose.yaml — Quick local dev alternative to Kind cluster
# Usage: docker compose up -d
#
# This runs the infrastructure services only (not the app).
# Run the app locally with: uv run uvicorn nullrealm.main:app --reload

services:
  # --- PostgreSQL with pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nullrealm
      POSTGRES_PASSWORD: nullrealm
      POSTGRES_DB: nullrealm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nullrealm"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- NATS with JetStream ---
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    volumes:
      - natsdata:/data

  # --- Jaeger (all-in-one) — distributed tracing ---
  jaeger:
    image: jaegertracing/all-in-one:1.62
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

  # --- Langfuse — LLM observability ---
  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nullrealm:nullrealm@postgres:5432/nullrealm
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: null-realm-dev-secret-change-me
      SALT: null-realm-dev-salt-change-me
      TELEMETRY_ENABLED: "false"
    ports:
      - "3001:3000"

  # --- Prometheus — metrics collection ---
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # --- Grafana — dashboards ---
  grafana:
    image: grafana/grafana:11.2.2
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  natsdata:
  promdata:
  grafanadata:
