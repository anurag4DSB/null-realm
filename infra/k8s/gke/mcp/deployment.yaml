apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: null-realm
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: europe-west1-docker.pkg.dev/helpful-rope-230010/null-realm/mcp:latest
          ports:
            - containerPort: 8090
          command: ["uv", "run", "python", "-m", "nullrealm.mcp_server", "--port", "8090"]
          env:
            - name: LITELLM_URL
              value: "http://litellm.null-realm.svc.cluster.local:4000/v1"
            - name: DATABASE_URL
              value: "postgresql+asyncpg://nullrealm:nullrealm_gke_dev@10.5.0.3:5432/nullrealm"
            - name: NEO4J_URI
              value: "bolt://neo4j.null-realm.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              value: "neo4j-null-realm"
            - name: GOOGLE_CLOUD_PROJECT
              value: "helpful-rope-230010"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger.null-realm.svc.cluster.local:4317"
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: GOOGLE_OAUTH_CLIENT_ID
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: GOOGLE_OAUTH_CLIENT_SECRET
            - name: MCP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: MCP_JWT_SECRET
            - name: MCP_REDIRECT_URI
              value: "http://hopocalypse.34.53.165.155.nip.io/oauth/callback"
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 3Gi
          startupProbe:
            httpGet:
              path: /health
              port: 8090
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            periodSeconds: 10
