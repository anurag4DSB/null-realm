# All traffic goes through OAuth2 Proxy, which handles Google login
# and proxies authenticated requests to upstream services.
# Grafana and Jaeger are accessible via port-forward for now.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: null-realm
  namespace: null-realm
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: oauth2-proxy
          port: 4180
