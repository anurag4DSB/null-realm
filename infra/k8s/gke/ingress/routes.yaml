# Langfuse — root domain, behind Google OAuth via OAuth2 Proxy
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: langfuse
  namespace: null-realm
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`34.53.165.155.nip.io`)
      kind: Rule
      services:
        - name: oauth2-proxy
          port: 4180
---
# Chat UI (Chainlit) — subdomain, OAuth protected
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: chat
  namespace: null-realm
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`chat.34.53.165.155.nip.io`)
      kind: Rule
      middlewares:
        - name: oauth2-auth
      services:
        - name: chainlit
          port: 8501
