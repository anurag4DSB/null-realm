# Langfuse — behind Google OAuth via OAuth2 Proxy (handles login flow)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: null-realm
  namespace: null-realm
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/oauth2`) || PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: oauth2-proxy
          port: 4180
---
# Grafana — protected by OAuth2 cookie check
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: null-realm
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/grafana`)
      kind: Rule
      priority: 10
      middlewares:
        - name: oauth2-auth
      services:
        - name: prometheus-grafana
          port: 80
---
# Jaeger — protected by OAuth2 cookie check
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jaeger
  namespace: null-realm
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/jaeger`)
      kind: Rule
      priority: 10
      middlewares:
        - name: oauth2-auth
      services:
        - name: jaeger
          port: 16686
