# Traefik ForwardAuth middleware — delegates auth to OAuth2 Proxy
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-auth
  namespace: null-realm
spec:
  forwardAuth:
    address: http://oauth2-proxy.null-realm.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
