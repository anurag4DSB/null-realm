# Check OAuth2 cookie — returns 202 if logged in, 401 if not.
# Users who haven't logged in yet should visit / first (Langfuse handles the Google redirect).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-auth
  namespace: null-realm
spec:
  forwardAuth:
    address: http://oauth2-proxy.null-realm.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
