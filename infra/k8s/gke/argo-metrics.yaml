# Argo controller metrics — expose for Prometheus scraping (HTTPS)
apiVersion: v1
kind: Service
metadata:
  name: argo-controller-metrics
  namespace: null-realm
  labels:
    app.kubernetes.io/component: workflow-controller
spec:
  selector:
    app.kubernetes.io/component: workflow-controller
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argo-controller-metrics
  namespace: null-realm
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: workflow-controller
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
