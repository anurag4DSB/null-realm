apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: null-realm
  labels:
    app: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          image: null-realm-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          command: ["uv", "run", "uvicorn", "nullrealm.main:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: LITELLM_URL
              value: "http://litellm.null-realm.svc.cluster.local:4000/v1"
            - name: NATS_URL
              value: "nats://nats.null-realm.svc.cluster.local:4222"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger.null-realm.svc.cluster.local:4317"
            - name: LANGFUSE_HOST
              value: "http://langfuse.null-realm.svc.cluster.local:3000"
          envFrom:
            - secretRef:
                name: llm-api-keys
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
