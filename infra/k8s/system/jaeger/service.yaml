apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: null-realm
  labels:
    app: jaeger
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      protocol: TCP
      nodePort: 30003
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: compact-thrift
      port: 6831
      targetPort: 6831
      protocol: UDP
  type: NodePort
