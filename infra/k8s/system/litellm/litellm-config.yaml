apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: null-realm
data:
  config.yaml: |
    model_list:
      - model_name: claude-sonnet
        litellm_params:
          model: anthropic/claude-sonnet-4-20250514
          api_key: os.environ/ANTHROPIC_API_KEY
    general_settings:
      master_key: null
